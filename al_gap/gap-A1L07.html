<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabelübung Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .drop-zone { min-width: 90px; height: 1.6em; display: inline-flex; align-items: center; justify-content: center; border-bottom: 2px solid #4a5568; margin: 0 4px; padding: 0 8px; cursor: pointer; transition: all 0.2s; position: relative; top: 2px; }
        .drop-zone:hover { background-color: #f7fafc; }
        .drop-zone.selected { background-color: #ebf8ff; border-color: #4299e1; border-bottom-style: dashed; }
        .item-card { cursor: pointer; user-select: none; transition: all 0.1s; }
        .item-card:active { transform: scale(0.95); }
        .item-card.selected { background-color: #4299e1 !important; color: white !important; box-shadow: 0 0 0 2px #bee3f8; }
        .placed-word { color: #1a202c; font-weight: bold; }
        .placed-word.active-orange { color: #ea580c !important; }
        .correct { color: #38a169; font-weight: bold; display: inline-flex; align-items: center; gap: 2px; }
        .incorrect { color: #e53e3e; font-weight: bold; text-decoration: line-through; }
        .solution { color: #3182ce; font-weight: bold; margin-left: 6px; font-size: 0.95em; }
        #qrcode img, #modal-qrcode img { display: inline-block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 font-sans flex items-center justify-center">
    <div id="game-container" class="max-w-2xl w-full mx-auto bg-white rounded-xl shadow-lg p-6">
        <div class="flex flex-row items-center justify-between gap-4 mb-6 pb-4 border-b border-gray-100">
            <p class="text-sm text-gray-600 italic leading-snug flex-1 m-0">
                Toca un item y un hueco para moverlo ahí, o al revés. Para cambiarlo, selecciónalo y toca adonde quieras moverlo. El objetivo continuar hasta acertarlas todas.
            </p>
            <div id="qrcode" onclick="openQRModal()" class="bg-white p-1 border border-gray-200 rounded shadow-sm shrink-0 cursor-pointer hover:border-blue-400 transition" title="Click para agrandar"></div>
        </div>
        <div id="items-container" class="flex flex-wrap gap-2 mb-8 p-4 bg-blue-50 rounded-lg min-h-auto border-2 border-dashed border-blue-200"></div>
        <div id="sentences-list" class="space-y-4 mb-8"></div>
        <div id="result-container" class="hidden mb-6 p-4 rounded-lg text-center font-bold text-lg"></div>
        <div class="flex gap-4 justify-center">
            <button id="btn-check" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-full font-semibold transition shadow-md">corregir</button>
            <button id="btn-reset" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-full font-semibold transition shadow-md">intentarlo de nuevo</button>
        </div>
    </div>

    <div id="qr-modal" onclick="closeQRModal()" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div onclick="event.stopPropagation()" class="bg-white p-6 rounded-xl shadow-2xl text-center max-w-xs w-full relative">
            <button onclick="closeQRModal()" class="absolute top-2 right-3 text-gray-400 hover:text-gray-700 font-bold text-lg">&times;</button>
            <div id="modal-qrcode" class="inline-block bg-white p-2 border border-gray-100 rounded mt-2"></div>
        </div>
    </div>

    <script>
        const vocabulary = [{"id":1,"text":"stehe","solution":"stehe","sentence":"Ich [gap] jeden Tag um 7 Uhr auf."},{"id":2,"text":"arbeite","solution":"arbeite","sentence":"Heute [gap] ich nicht, ich bin faul."},{"id":3,"text":"hungrig","solution":"hungrig","sentence":"Ich habe kein Essen. Ich bin [gap]."},{"id":4,"text":"dusche","solution":"dusche","sentence":"Morgens [gap] ich mich schnell mit warmem Wasser."},{"id":5,"text":"müde","solution":"müde","sentence":"Ich bin [gap], ich gehe jetzt ins Bett."},{"id":6,"text":"langweilig","solution":"langweilig","sentence":"Der Film ist nicht interessant, er ist [gap]."},{"id":7,"text":"gefährlich","solution":"gefährlich","sentence":"Das ist nicht sicher, es ist [gap]."},{"id":8,"text":"trinke","solution":"trinke","sentence":"Ich [gap] nicht viel Kaffee, nur ein wenig."},{"id":9,"text":"wichtig","solution":"wichtig","sentence":"Lernen ist für die Schule sehr [gap]."},{"id":10,"text":"müde","solution":"müde","sentence":"Es ist spät und ich möchte schlafen, ich bin [gap]."}];
        let state = { selectedItem: null, selectedSlot: null, placements: {}, isCorrected: false, currentOrder: [] };
        const itemsContainer = document.getElementById('items-container');
        const sentencesList = document.getElementById('sentences-list');
        const btnCheck = document.getElementById('btn-check');
        const btnReset = document.getElementById('btn-reset');
        const resultContainer = document.getElementById('result-container');

        function generateQRCodes() {
            const currentURL = window.location.href;
            new QRCode(document.getElementById("qrcode"), { text: currentURL, width: 50, height: 50, correctLevel: QRCode.CorrectLevel.M });
            new QRCode(document.getElementById("modal-qrcode"), { text: currentURL, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.H });
        }
        function openQRModal() { document.getElementById('qr-modal').classList.remove('hidden'); }
        function closeQRModal() { document.getElementById('qr-modal').classList.add('hidden'); }
        
        function init() {
            state.isCorrected = false; state.placements = {}; state.selectedItem = null; state.selectedSlot = null;
            resultContainer.classList.add('hidden');
            state.currentOrder = [...vocabulary].sort(() => Math.random() - 0.5);
            render();
        }
        function render() {
            itemsContainer.innerHTML = '';
            const placedItemIds = Object.values(state.placements);
            if (placedItemIds.length === vocabulary.length) {
                itemsContainer.classList.add('hidden');
            } else {
                itemsContainer.classList.remove('hidden');
            }
            vocabulary.forEach(item => {
                if (!placedItemIds.includes(item.id)) {
                    const div = document.createElement('div');
                    div.className = `item-card px-3 py-1 bg-white border border-blue-300 rounded shadow-sm text-sm font-medium ${state.selectedItem === item.id ? 'selected' : ''}`;
                    div.textContent = item.text; div.onclick = () => handleItemClick(item.id); itemsContainer.appendChild(div);
                }
            });
            sentencesList.innerHTML = '';
            state.currentOrder.forEach((data, index) => {
                const div = document.createElement('div');
                div.className = "flex flex-wrap items-baseline text-gray-800 leading-relaxed text-sm md:text-base";
                const parts = data.sentence.split('[gap]');
                const startText = document.createElement('span'); startText.textContent = `${index + 1}. ${parts[0]}`; div.appendChild(startText);
                const slot = document.createElement('span'); slot.className = `drop-zone ${state.selectedSlot === index ? 'selected' : ''}`;
                const placedId = state.placements[index];
                if (placedId) {
                    const itemData = vocabulary.find(v => v.id === placedId);
                    if (state.isCorrected) {
                        const isRight = itemData.id === data.id;
                        const span = document.createElement('span'); span.className = isRight ? 'correct' : 'incorrect';
                        if (isRight) {
                            span.innerHTML = `${itemData.text} <span class="text-emerald-600 ml-1">✔</span>`; slot.appendChild(span);
                        } else {
                            span.textContent = itemData.text; slot.appendChild(span);
                            const solSpan = document.createElement('span'); solSpan.className = 'solution'; solSpan.textContent = ` ${data.solution}`; slot.appendChild(solSpan);
                        }
                    } else { 
                        const isOrange = (state.selectedSlot === index);
                        const span = document.createElement('span');
                        span.className = `placed-word ${isOrange ? 'active-orange' : ''}`;
                        span.textContent = itemData.text;
                        slot.appendChild(span);
                    }
                } else if (state.isCorrected) {
                    const solSpan = document.createElement('span'); solSpan.className = 'solution'; solSpan.textContent = ` ${data.solution}`; slot.appendChild(solSpan);
                }
                slot.onclick = () => handleSlotClick(index); div.appendChild(slot);
                if (parts[1]) {
                    const endText = document.createElement('span'); endText.textContent = parts[1]; div.appendChild(endText);
                }
                sentencesList.appendChild(div);
            });
        }
        function handleItemClick(itemId) {
            if (state.isCorrected) return;
            if (state.selectedSlot !== null && !state.placements[state.selectedSlot]) { moveItemToSlot(itemId, state.selectedSlot); } 
            else { state.selectedItem = state.selectedItem === itemId ? null : itemId; state.selectedSlot = null; }
            render();
        }
        function handleSlotClick(slotIndex) {
            if (state.isCorrected) return;
            const itemInSlot = state.placements[slotIndex];
            if (state.selectedItem !== null) { moveItemToSlot(state.selectedItem, slotIndex); } 
            else if (state.selectedSlot !== null) {
                if (state.selectedSlot === slotIndex) { delete state.placements[slotIndex]; state.selectedSlot = null; } 
                else {
                    const itemToMove = state.placements[state.selectedSlot];
                    if (itemToMove) {
                        for (let key in state.placements) { if (state.placements[key] === itemToMove) delete state.placements[key]; }
                        state.placements[slotIndex] = itemToMove;
                    }
                    state.selectedSlot = null;
                }
            } else { if (itemInSlot) { state.selectedSlot = slotIndex; } else { state.selectedSlot = slotIndex; } }
            render();
        }
        function moveItemToSlot(itemId, slotIndex) {
            for (let key in state.placements) { if (state.placements[key] === itemId) delete state.placements[key]; }
            state.placements[slotIndex] = itemId; state.selectedItem = null; state.selectedSlot = null;
        }
        btnCheck.onclick = () => {
            if (state.isCorrected) return; let score = 0;
            state.currentOrder.forEach((data, index) => { if (state.placements[index] === data.id) score++; });
            state.isCorrected = true; resultContainer.textContent = `Puntuación: ${score} / ${vocabulary.length}`;
            resultContainer.className = `mb-6 p-4 rounded-lg text-center font-bold text-lg ${score === vocabulary.length ? 'bg-green-100 text-green-800' : 'bg-orange-100 text-orange-800'}`;
            resultContainer.classList.remove('hidden'); render();
        };
        btnReset.onclick = init;
        window.onload = () => { init(); generateQRCodes(); };
    </script>
</body>
</html>
