<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tareas Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 40px; line-height: 1.6; max-width: 600px; margin: auto; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .link-container { margin-top: 20px; }
        .app-link { 
            display: block; 
            padding: 15px; 
            margin-bottom: 10px; 
            background: #f4f4f4; 
            text-decoration: none; 
            color: #0366d6; 
            border-radius: 8px; 
            border: 1px solid #ddd;
            font-weight: bold;
        }
        .app-link:hover { background: #eef5ff; border-color: #0366d6; }
        #loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h1>My Web Projects</h1>
    <p>Select a tool from the list below:</p>

    <div class="link-container" id="project-list">
        <p id="loading">Cargando herramientas desde GitHub...</p>
        </div>

    <script>
        const repoOwner = 'jlts059';
        const repoName = 'Tareas';

        async function cargarProyectos() {
            const url = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/`;
            
            try {
                const response = await fetch(url);
                const files = await response.json();
                
                const container = document.getElementById('project-list');
                container.innerHTML = ''; // Borramos el mensaje de "Cargando"

                files.forEach(file => {
                    // Filtramos: solo archivos .html excepto el index
                    if (file.name.endsWith('.html') && file.name.toLowerCase() !== 'index.html') {
                        
                        const link = document.createElement('a');
                        link.href = file.name;
                        link.className = 'app-link';

                        // Lógica sencilla para poner iconos según el nombre
                        let icon = '📄'; 
                        const name = file.name.toLowerCase();
                        if (name.includes('ruleta')) icon = '🎲';
                        if (name.includes('flash')) icon = '🗂️';
                        if (name.includes('qr') || name.includes('drive')) icon = '🔳';
                        if (name.includes('quiz')) icon = '📝';

                        // Limpiamos el nombre para que no se vea el ".html"
                        const cleanName = file.name.replace('.html', '');

                        link.innerHTML = `${icon} ${cleanName}`;
                        container.appendChild(link);
                    }
                });

            } catch (error) {
                console.error("Error cargando archivos:", error);
                document.getElementById('loading').innerText = "Error al cargar los proyectos.";
            }
        }

        cargarProyectos();
    </script>

</body>
</html>
