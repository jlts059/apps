<script>
        const repoOwner = 'jlts059';
        const repoName = 'apps';

        const folderEmojis = {
            'home': '🏠',
            'juegos': '🎮',
            'estudios': '📚',
            'utilidades': '🛠️',
            'quiz': '📝',
            'quiz_voc': '📝',
            'default': '📁'
        };

        async function cargarProyectos() {
            const url = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/`;
            
            try {
                const response = await fetch(url);
                
                // Si GitHub nos bloquea por Rate Limit, manejamos el error limpiamente
                if (!response.ok) {
                    throw new Error(`GitHub API respondió con estado: ${response.status}`);
                }

                const items = await response.json();
                
                // Si la respuesta no es un array válido, abortamos
                if (!Array.isArray(items)) {
                    throw new Error("La respuesta de GitHub no es un listado válido.");
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('blocks-wrapper').style.display = 'flex';

                // 1. Crear siempre la pestaña HOME primero
                createTab('Home', 'other');

                // Separar carpetas y archivos sueltos de forma segura
                const directorios = items.filter(item => item && item.type === 'dir');
                const archivosSueltos = items.filter(item => item && item.type === 'file' && item.name.endsWith('.html') && item.name.toLowerCase() !== 'index.html');

                // 2. Renderizar archivos sueltos en el Home inmediatamente
                if (archivosSueltos.length > 0) {
                    renderFiles(archivosSueltos, 'Home');
                }

                // 3. Procesar las carpetas
                const promesasCarpetas = directorios.map(async (item) => {
                    let bloque = 'other';
                    const lowerName = item.name.toLowerCase();
                    
                    if (lowerName.startsWith('al_')) {
                        bloque = 'al';
                    } else if (lowerName.startsWith('in_')) {
                        bloque = 'in';
                    }

                    // Crear la pestaña en la interfaz
                    createTab(item.name, bloque);
                    
                    // Consultar los archivos internos con su propio try/catch para que si falla una carpeta, no rompa las demás
                    try {
                        const subRes = await fetch(item.url);
                        if (subRes.ok) {
                            const files = await subRes.json();
                            if (Array.isArray(files)) {
                                renderFiles(files, item.name);
                            }
                        }
                    } catch (err) {
                        console.error(`Error específico cargando contenido de la carpeta ${item.name}:`, err);
                    }
                });

                // Esperamos a que termine el procesamiento de red
                await Promise.all(promesasCarpetas);

                // 4. Limpieza: Ocultar bloques que se hayan quedado completamente vacíos
                if (document.getElementById('tabs-al').children.length === 0) document.getElementById('block-al-container').style.display = 'none';
                if (document.getElementById('tabs-in').children.length === 0) document.getElementById('block-in-container').style.display = 'none';
                if (document.getElementById('tabs-other').children.length === 0) document.getElementById('block-other-container').style.display = 'none';

                // 5. Activar la primera pestaña disponible
                const primerBoton = document.querySelector('.tab-button');
                if (primerBoton) {
                    primerBoton.click();
                }

            } catch (error) {
                console.error("Error crítico en la carga:", error);
                // Si todo falla (ej. Rate limit estricto), quitamos el loading y mostramos un mensaje amigable en pantalla
                document.getElementById('loading').innerHTML = `
                    <p style="color: #e74c3c; font-weight: bold;">⚠️ Límite de la API de GitHub alcanzado o error de red.</p>
                    <p style="font-size: 0.9em; color: #666;">Espera unos minutos antes de recargar la página o abre la consola del navegador (F12) para más detalles.</p>
                `;
            }
        }

        function createTab(name, bloque) {
            const tabsContainer = document.getElementById(`tabs-${bloque}`);
            const contentsContainer = document.getElementById('contents-container');
            
            if (!tabsContainer || !contentsContainer) return;
            if (document.getElementById(`btn-${name}`)) return; 

            const cleanKeyForEmoji = name.toLowerCase().replace(/^al_/, '').replace(/^in_/, '');
            const emoji = folderEmojis[cleanKeyForEmoji] || folderEmojis['default'];
            const displayName = name.replace(/^al_|^in_/i, '');

            const btn = document.createElement('button');
            btn.className = 'tab-button';
            btn.id = `btn-${name}`;
            btn.innerHTML = `${emoji} ${displayName}`;
            btn.onclick = () => openTab(name);
            tabsContainer.appendChild(btn);

            const contentDiv = document.createElement('div');
            contentDiv.id = name;
            contentDiv.className = 'tab-content';
            contentsContainer.appendChild(contentDiv);
        }

        function renderFiles(files, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;

            files.forEach(file => {
                if (file && file.name && file.name.endsWith('.html') && file.name.toLowerCase() !== 'index.html') {
                    const link = document.createElement('a');
                    link.href = containerId === 'Home' ? file.name : `${containerId}/${file.name}`;
                    link.className = 'app-link';
                    
                    let fileIcon = '📄';
                    const n = file.name.toLowerCase();
                    if (n.includes('ruleta') || n.includes('wheel')) fileIcon = '🎲';
                    if (n.includes('quiz')) fileIcon = '📝';
                    if (n.includes('qr') || n.includes('drive')) fileIcon = '🔳';

                    const cleanName = file.name.replace('.html', '').replace(/-/g, ' ').replace(/_/g, ' ');
                    link.innerHTML = `<span class="icon">${fileIcon}</span> ${cleanName}`;
                    container.appendChild(link);
                }
            });
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(tb => tb.classList.remove('active'));
            
            const targetContent = document.getElementById(tabId);
            const targetBtn = document.getElementById(`btn-${tabId}`);
            
            if(targetContent) targetContent.classList.add('active');
            if(targetBtn) targetBtn.classList.add('active');
        }

        // Ejecutar el cargador principal
        cargarProyectos();
    </script>
