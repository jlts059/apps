<!DOCTYPE html>
<html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tile Panel</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* Configuración del Administrador */
        #admin-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            max-width: 600px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #27ae60;
        }

        #btn-export {
            background-color: #e67e22;
            display: none;
        }

        #btn-export:hover {
            background-color: #d35400;
        }

        /* CONTENEDOR QR: Limpio, inmune a deformaciones y perfectamente cuadrado */
        #qr-container {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.3s ease;
            z-index: 100;
            width: 96px;
            height: 96px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #qr-container:hover {
            transform: scale(1.05);
        }

        /* La imagen nativa del QR mantiene su proporción cuadrada de forma estricta */
        .qr-image {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
            display: block;
        }

        /* QR en pantalla completa (Modal) */
        #qr-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #qr-large {
            background: white;
            padding: 20px;
            border-radius: 16px;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Grid de Azulejos Autoadaptable */
        #tiles-grid {
            display: grid;
            gap: 20px;
            max-width: 1200px;
            margin: 40px auto;
        }

        @media (orientation: portrait) {
            #tiles-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (orientation: landscape) {
            #tiles-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .tile {
            color: #2c3e50;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.8rem;
            font-weight: bold;
            border-radius: 16px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tile:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.12);
        }

        .empty-tile {
            aspect-ratio: 1 / 1;
        }

        #status-message {
            font-weight: bold;
            color: #c0392b;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    

    <div id="qr-container" onclick="abrirQR()" title="Click para agrandar">
        <img id="qrcode" class="qr-image" alt="QR Link" src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&amp;data=file%3A%2F%2F%2FC%3A%2FUsers%2FJL%2FDesktop%2Fgemini-code-1782481861955.html">
    </div>

    <div id="qr-overlay" onclick="cerrarQR()">
        <div id="qr-large">
            <img id="qrcode-large" class="qr-image" alt="QR Link Grande" src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&amp;data=file%3A%2F%2F%2FC%3A%2FUsers%2FJL%2FDesktop%2Fgemini-code-1782481861955.html">
        </div>
    </div>

    <div id="tiles-grid"><a class="tile" href="https://drive.google.com/file/d/1XF7Lj0d5g7iHpM-TGEA2JWXoENSN6kOc/preview?usp=drivesdk" target="_blank" style="background-color: rgb(241, 225, 177);">1</a><a class="tile" href="https://drive.google.com/file/d/1SRVOUh2GSh3jZR91XFFeI8b5GY8dVaMv/preview?usp=drivesdk" target="_blank" style="background-color: rgb(209, 241, 177);">2</a><a class="tile" href="https://drive.google.com/file/d/19QxImEyFXuaMb2OIqXgiNVtBp26QXKCf/preview?usp=drivesdk" target="_blank" style="background-color: rgb(177, 241, 193);">3</a><a class="tile" href="https://drive.google.com/file/d/1V6LRotsaxTeEaq4ezBj8MwDuiYdGs1G5/preview?usp=drivesdk" target="_blank" style="background-color: rgb(177, 241, 241);">4</a><a class="tile" href="https://drive.google.com/file/d/15d56ugkKfuQ1_6pKFYlue0NZr6-x7gWH/preview?usp=drivesdk" target="_blank" style="background-color: rgb(177, 193, 241);">5</a><a class="tile" href="https://drive.google.com/file/d/1U0FmBRVt2JOa-rfMwhEtS_MwN2TrcD_E/preview?usp=drivesdk" target="_blank" style="background-color: rgb(209, 177, 241);">6</a><a class="tile" href="https://drive.google.com/file/d/1VxQAW61qkcrxl3TM9wnmIsGMKYpeBvDA/preview?usp=drivesdk" target="_blank" style="background-color: rgb(241, 177, 225);">7</a></div>

    <script>
                    const urlActual = window.location.href;
                    const qrUrlBase = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(urlActual)}`;
                    document.getElementById("qrcode").src = qrUrlBase;
                    document.getElementById("qrcode-large").src = qrUrlBase;

                    function abrirQR() { document.getElementById('qr-overlay').style.display = 'flex'; }
                    function cerrarQR() { document.getElementById('qr-overlay').style.display = 'none'; }
                </script>

</body></html>
