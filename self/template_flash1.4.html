<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Flashcard Study Tool</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #f0f2f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    overflow-x: hidden;
  }

  /* SETUP VIEW */
  #setup-container {
    background: white;
    padding: 2rem;
    border-radius: 24px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    max-width: 600px;
    width: 90%;
    text-align: center;
  }

  textarea {
    width: 100%;
    height: 200px;
    margin: 1rem 0;
    padding: 10px;
    border: 2px solid #e0e6ed;
    border-radius: 12px;
    font-family: inherit;
    box-sizing: border-box;
  }

  /* FLASHCARD VIEW */
  #flashcard-view {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  #classroom-qr-container {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 120px;
    height: 120px;
    background-color: white;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5px;
    box-sizing: border-box;
  }

  #classroom-qr-container img { max-width: 100%; height: auto; }

  @media (max-width: 900px) {
    #classroom-qr-container { display: none; }
  }

  #instruction {
    margin-bottom: 0.5rem;
    color: #546e7a;
    font-weight: 500;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .progress { margin-bottom: 5px; font-size: 0.9rem; color: #90a4ae; font-weight: bold; }
  
  #indicators-container {
    display: flex;
    gap: 10px;
    min-height: 24px;
    margin-bottom: 5px;
  }

  #star-indicator {
    font-size: 1rem;
    font-weight: bold;
    color: #f1c40f;
    visibility: hidden;
  }

  #error-indicator {
    font-size: 1rem;
    font-weight: bold;
    color: #e67e22;
    visibility: hidden;
  }

  #card {
    background: white;
    border-radius: 24px;
    padding: 2.5rem 1.5rem;
    max-width: 550px;
    width: 90%;
    min-height: 280px;
    display: flex;
    flex-direction: column; 
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 1.6rem;
    line-height: 1.4;
    cursor: pointer;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    transition: transform 0.1s ease, background 0.3s ease;
    border-bottom: 8px solid #2c3e50;
    margin-bottom: 25px;
    color: #2c3e50;
    word-wrap: break-word;
    overflow-wrap: break-word;
    position: relative;
  }

  #card:active { transform: scale(0.98); }

  .controls-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 90%;
    max-width: 550px;
    align-items: center;
  }

  .controls-row { 
    display: flex; 
    gap: 8px; 
    justify-content: center; 
    width: 100%;
    flex-wrap: wrap;
  }

  button {
    padding: 0.7rem 1.1rem;
    font-size: 0.85rem;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
    flex: 1;
    min-width: 80px;
  }

  .btn-next { background: #2c3e50; color: white; box-shadow: 0 4px 0 #1a252f; }
  .btn-know { background: #27ae60; color: white; box-shadow: 0 4px 0 #219653; }
  .btn-discard { background: #e74c3c; color: white; box-shadow: 0 4px 0 #c0392b; }
  .btn-secondary { background: #7f8c8d; color: white; box-shadow: 0 4px 0 #5c6366; }
  .btn-star { background: #f1c40f; color: #2c3e50; box-shadow: 0 4px 0 #f39c12; }
  .btn-error { background: #e67e22; color: white; box-shadow: 0 4px 0 #d35400; }
  .btn-save { background: #3498db; color: white; box-shadow: 0 4px 0 #2980b9; }
  .btn-utility { background: #e0e6ed; color: #2c3e50; box-shadow: 0 4px 0 #b0bec5; }

  button:active { transform: translateY(2px); box-shadow: none; }
  button:disabled { background: #ccc !important; color: #666 !important; cursor: not-allowed; box-shadow: none !important; transform: none !important; }

  /* MODAL (LIST VIEW) */
  #list-modal {
    display: none;
    position: fixed;
    z-index: 100;
    left: 0; top: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
  }
  .modal-content {
    background-color: white;
    margin: 5% auto;
    padding: 20px;
    border-radius: 15px;
    width: 80%;
    max-width: 700px;
    max-height: 80vh;
    overflow-y: auto;
  }
  table { width: 100%; border-collapse: collapse; margin-top: 15px; }
  th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 0.9rem; }
  th { background-color: #f8f9fa; }
</style>
</head>
<body>

  <div id="setup-container">
    <h2 style="color: #2c3e50; margin-top: 0;">Create Your Deck</h2>
    <textarea id="csv-input" placeholder="Term [TAB] Definition"></textarea>
    <button style="background: #27ae60; color: white; width: 100%; font-size: 1.1rem;" onclick="loadCustomDeck()">Generate Flashcards ➔</button>
    <p style="font-size: 0.8rem; color: #7f8c8d; margin-top: 10px;">Shortcuts: [V] Next | [Z] Know (discard) | [X] Discard/Peek | [C] Star | [E] Report Error | [Space] Flip</p>
  </div>

  <div id="flashcard-view">
    <div id="classroom-qr-container"></div>
    <div id="instruction">Tap the card to flip (or Space)</div>
    <div class="progress" id="progress">Card 0 of 0</div>
    <div id="indicators-container">
      <span id="star-indicator">⭐ Starred</span>
      <span id="error-indicator">⚠️ Error</span>
    </div>
    
    <div id="card" onclick="flipCard()">Loading...</div>
    
    <div class="controls-container">
      <div class="controls-row">
        <button class="btn-next" id="nextBtn" onclick="nextCard()">Next (V)</button>
        <button class="btn-know" id="knowBtn" onclick="knowCard()">Know (discard) (Z)</button>
        <button class="btn-discard" id="discardBtn" onclick="discardCardWithPeek()">Discard (X)</button>
        <button class="btn-secondary" id="shuffleBtn" onclick="shuffleDeck()">Shuffle</button>
        <button class="btn-secondary" id="restartBtn" onclick="resetDeckSequential()">Restart</button>
        <button class="btn-star" id="starBtn" onclick="toggleStar()">Star (C)</button>
        <button class="btn-error" id="errorBtn" onclick="toggleError()">Report Error (E)</button>
      </div>
      
      <div class="controls-row">
        <button class="btn-save" id="saveFullBtn" onclick="downloadDeck('full')">💾 Save Full</button>
        <button class="btn-save" id="saveLeftBtn" onclick="downloadDeck('left')">💾 Save Left</button>
        <button class="btn-save" id="saveStarBtn" onclick="downloadDeck('star')">💾 Save Star</button>
      </div>

      <div class="controls-row" style="margin-top: 10px;">
        <button class="btn-utility" id="listBtn" onclick="showList('all')">👁 Show Full List</button>
        <button class="btn-utility" id="leftListBtn" onclick="showList('left')">⏳ Show Left List</button>
        <button class="btn-utility" id="starListBtn" onclick="showList('star')">⭐ Show Star List</button>
        <button class="btn-utility" id="errorListBtn" onclick="showList('error')">⚠️ Show Error List</button>
        <button class="btn-utility" id="newBtn" onclick="location.reload()">↺ New List</button>
      </div>
    </div>
  </div>

  <div id="list-modal" onclick="closeList(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3 id="modal-title" style="margin:0">Vocabulary List</h3>
        <div style="display: flex; gap: 10px;">
          <button id="download-txt-btn" class="btn-save" onclick="downloadErrorTxt()" style="display:none; flex:none; width:auto; padding: 0.4rem 1rem;">⬇️ Download TXT</button>
          <button class="btn-utility" onclick="closeList()" style="flex:none; width:auto; padding: 0.4rem 1rem;">Close</button>
        </div>
      </div>
      <table id="vocab-table">
        <thead><tr><th>Column 1</th><th>Column 2</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script>
let originalDeck = []; 
let activeDeck = []; 
let currentIndex = 0;
let isFlipped = false;
let isActionFrozen = false; 

window.onload = function() {
    if (originalDeck.length > 0) startApp();
};

// --- KEYBOARD SHORTCUTS ---
document.addEventListener('keydown', function(event) {
  if (event.target.tagName === 'TEXTAREA' || isActionFrozen) return;

  const key = event.key.toLowerCase();
  
  if (key === 'v') {
    nextCard();
  }
  else if (key === 'z') {
    knowCard();
  } 
  else if (key === 'x') {
    discardCardWithPeek();
  } 
  else if (key === 'c') {
    toggleStar();
  }
  else if (key === 'e') {
    toggleError();
  }
  else if (key === ' ') {
    event.preventDefault(); 
    flipCard();
  }
});

function loadCustomDeck() {
  const input = document.getElementById('csv-input').value.trim();
  if (!input) return alert("Please paste some data first!");
  const lines = input.split('\n');
  originalDeck = lines.map(line => {
    const parts = line.split('\t');
    return { 
      sideA: parts[0] ? parts[0].trim() : "", 
      sideB: parts[1] ? parts[1].trim() : "",
      starred: false,
      hasError: false
    };
  }).filter(item => item.sideA || item.sideB);
  if (originalDeck.length === 0) return alert("No valid data found.");
  startApp();
}

function startApp() {
  document.getElementById('setup-container').style.display = 'none';
  document.getElementById('flashcard-view').style.display = 'flex';
  generateClassroomQR();
  resetDeckSequential(); 
}

function resetDeckSequential() {
  activeDeck = [...originalDeck]; 
  initSession();
}

function shuffleDeck() {
  activeDeck = [...activeDeck].sort(() => Math.random() - 0.5); 
  initSession();
}

function initSession() {
  currentIndex = 0;
  isFlipped = false;
  isActionFrozen = false;
  setButtonsDisabled(false);
  updateDisplay();
}

function setButtonsDisabled(disabledState) {
  document.getElementById("nextBtn").disabled = disabledState;
  document.getElementById("knowBtn").disabled = disabledState;
  document.getElementById("discardBtn").disabled = disabledState;
  document.getElementById("shuffleBtn").disabled = disabledState;
  document.getElementById("restartBtn").disabled = disabledState;
  document.getElementById("starBtn").disabled = disabledState;
  document.getElementById("errorBtn").disabled = disabledState;
}

function updateDisplay() {
  const current = activeDeck[currentIndex];
  const card = document.getElementById("card");
  const starIndicator = document.getElementById("star-indicator");
  const errorIndicator = document.getElementById("error-indicator");
  
  if (!current || activeDeck.length === 0 || currentIndex >= activeDeck.length) {
    card.innerHTML = "<b>Excellent!</b><br>All cards completed.";
    card.style.background = "#d4edda";
    starIndicator.style.visibility = "hidden";
    errorIndicator.style.visibility = "hidden";
    setButtonsDisabled(true);
    document.getElementById("restartBtn").disabled = false; 
    return;
  }

  document.getElementById("progress").textContent = `Card ${currentIndex + 1} of ${activeDeck.length}`;
  
  starIndicator.style.visibility = current.starred ? "visible" : "hidden";
  errorIndicator.style.visibility = current.hasError ? "visible" : "hidden";

  if (!isFlipped) {
    card.innerHTML = `<div>${current.sideA}</div>`; 
    card.style.background = "white";
    card.style.color = "#2c3e50";
  } else {
    card.innerHTML = `<div>${current.sideB}</div>`;
    card.style.background = "#eef6ff";
    card.style.color = "#1565c0";
  }
}

function flipCard() {
  if (currentIndex >= activeDeck.length || isActionFrozen) return;
  isFlipped = !isFlipped;
  updateDisplay();
}

function toggleStar() {
  if (currentIndex >= activeDeck.length || isActionFrozen) return;
  
  const currentActiveItem = activeDeck[currentIndex];
  currentActiveItem.starred = !currentActiveItem.starred;
  
  updateDisplay();
}

function toggleError() {
  if (currentIndex >= activeDeck.length || isActionFrozen) return;
  
  const currentActiveItem = activeDeck[currentIndex];
  currentActiveItem.hasError = !currentActiveItem.hasError;
  
  updateDisplay();
}

function nextCard() {
  if (currentIndex >= activeDeck.length || isActionFrozen) return;
  
  if (currentIndex < activeDeck.length - 1) {
    currentIndex++;
    isFlipped = false;
  } else {
    currentIndex = 0; 
    isFlipped = false;
  }
  updateDisplay();
}

function knowCard() {
  if (currentIndex >= activeDeck.length || isActionFrozen) return;
  
  activeDeck.splice(currentIndex, 1);
  
  if (currentIndex >= activeDeck.length) {
    currentIndex = 0; 
  }
  isFlipped = false;
  updateDisplay();
}

function discardCardWithPeek() {
  if (currentIndex >= activeDeck.length || isActionFrozen) return;
  
  isActionFrozen = true;
  isFlipped = true; 
  updateDisplay();
  setButtonsDisabled(true);

  setTimeout(() => {
    activeDeck.splice(currentIndex, 1);
    if (currentIndex >= activeDeck.length) {
      currentIndex = 0;
    }
    isFlipped = false;
    isActionFrozen = false;
    setButtonsDisabled(false);
    updateDisplay();
  }, 2000);
}

function showList(filterType) {
  const tbody = document.querySelector("#vocab-table tbody");
  const modalTitle = document.getElementById("modal-title");
  const downloadTxtBtn = document.getElementById("download-txt-btn");
  tbody.innerHTML = "";
  
  let listItems = [];
  downloadTxtBtn.style.display = "none";
  
  if (filterType === 'star') {
    listItems = originalDeck.filter(item => item.starred);
    modalTitle.textContent = "⭐ Starred Vocabulary List";
    if (listItems.length === 0) return alert("No starred items to display!");
  } else if (filterType === 'left') {
    listItems = activeDeck;
    modalTitle.textContent = "⏳ Remaining Vocabulary List";
    if (listItems.length === 0) return alert("No active items remaining!");
  } else if (filterType === 'error') {
    listItems = originalDeck.filter(item => item.hasError);
    modalTitle.textContent = "⚠️ Vocabulary Items to Correct";
    if (listItems.length === 0) return alert("No items marked with errors!");
    downloadTxtBtn.style.display = "block"; // Show download button only for errors
  } else {
    listItems = originalDeck;
    modalTitle.textContent = "Full Vocabulary List";
  }

  listItems.forEach(item => {
    const row = tbody.insertRow();
    const cell1 = row.insertCell(0);
    const cell2 = row.insertCell(1);
    
    let label = item.sideA;
    if (item.starred) label = `⭐ ${label}`;
    if (item.hasError) label = `⚠️ ${label}`;
    
    cell1.innerHTML = label;
    cell2.innerHTML = item.sideB;
  });
  document.getElementById("list-modal").style.display = "block";
}

function closeList() { document.getElementById("list-modal").style.display = "none"; }

function downloadErrorTxt() {
  const errorItems = originalDeck.filter(item => item.hasError);
  if (errorItems.length === 0) return alert("No items to download.");
  
  // Format items back to Term [TAB] Definition
  const txtContent = errorItems.map(item => `${item.sideA}\t${item.sideB}`).join('\n');
  
  const blob = new Blob([txtContent], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'errors_to_correct.txt';
  a.click();
}

function generateClassroomQR() {
  const currentUrl = window.location.href;
  const qrApiUrl = `https://quickchart.io/qr?text=${encodeURIComponent(currentUrl)}&size=200&margin=1`;
  const qrImg = new Image();
  qrImg.src = qrApiUrl;
  qrImg.onload = function() {
    const container = document.getElementById("classroom-qr-container");
    if(container) { container.innerHTML = ""; container.appendChild(qrImg); }
  };
}

function downloadDeck(mode) {
    let targetDeck = [];
    let filename = 'MyFlashcards.html';

    if (mode === 'full') {
      targetDeck = originalDeck;
      filename = 'Flashcards_Full.html';
    } else if (mode === 'left') {
      targetDeck = activeDeck;
      filename = 'Flashcards_Remaining.html';
    } else if (mode === 'star') {
      targetDeck = originalDeck.filter(item => item.starred);
      filename = 'Flashcards_Starred.html';
      if(targetDeck.length === 0) return alert("You haven't starred any cards yet!");
    }

    const cleanDeck = targetDeck.map(item => ({
      sideA: item.sideA,
      sideB: item.sideB,
      starred: item.starred,
      hasError: item.hasError
    }));

    let docHtml = document.documentElement.outerHTML;
    const dataString = `let originalDeck = ${JSON.stringify(cleanDeck)};`;
    const finalHtml = docHtml.replace(/let originalDeck = \[.*?\];/, dataString);
    
    const blob = new Blob([finalHtml], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}
</script>

</body>
</html>
