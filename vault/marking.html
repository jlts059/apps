<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Marking Grid (Two Tabs)</title>
    <style>
        :root{
            --card-bg: #ffffff;
            --page-bg: #f4f4f9;
            --gap: 6px;
            --max-width: 480px; /* narrower so buttons trend square */
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background-color: var(--page-bg);
            margin: 0;
            padding: 24px;
            gap: 16px;
        }

        .tabs {
            display: flex;
            gap: 8px;
        }

        .tab {
            padding: 8px 14px;
            background: #e9eef8;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            border: 1px solid rgba(0,0,0,0.06);
        }

        .tab.active {
            background: #2b6fb7;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        }

        .card {
            width: 100%;
            max-width: var(--max-width);
            background: var(--card-bg);
            padding: 16px;
            border-radius: 8px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: var(--gap);
            width: 100%;
        }

        .grid-btn {
            aspect-ratio: 1; /* keep roughly square */
            font-size: 14px;
            font-weight: 700;
            background-color: #e0e0e0;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.08s ease, box-shadow 0.08s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            padding: 0;
        }

        .grid-btn:active { transform: translateY(1px); }

        /* Selected styles by group */
        .grid-btn.selected.group-high {
            background-color: #4CAF50; /* green */
            color: #fff;
            border-color: #2E7D32;
        }

        .grid-btn.selected.group-mid {
            background-color: #2196F3; /* blue */
            color: #fff;
            border-color: #1565C0;
        }

        .grid-btn.selected.group-low {
            background-color: #FFCDD2; /* light red/pink */
            color: #7f1d1d;
            border-color: #ef9a9a;
        }

        .total-box {
            margin-top: 6px;
            font-size: 20px;
            font-weight: bold;
            padding: 10px 18px;
            background: #1976D2;
            color: white;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
            min-width: 96px;
            text-align: center;
            align-self: center;
        }

        /* hide inactive panels */
        .panel { display: none; }
        .panel.active { display: flex; flex-direction: column; gap: 8px; }
    </style>
</head>
<body>

    <div class="tabs">
        <div id="tabA" class="tab active">Marking A</div>
        <div id="tabB" class="tab">Marking B</div>
    </div>

    <div class="card panel active" id="panelA">
        <div class="grid-container" id="buttonGridA"></div>
        <div class="total-box" id="totalDisplayA">0</div>
    </div>

    <div class="card panel" id="panelB">
        <div class="grid-container" id="buttonGridB"></div>
        <div class="total-box" id="totalDisplayB">0</div>
    </div>

    <script>
        // Shared configuration
        const rowValues = [10, 9, 8, 7, 6, 5, 4, 2, 1.5, 0];
        const totalRows = 5;

        // Create both grids
        createGrid('buttonGridA', 'totalDisplayA');
        createGrid('buttonGridB', 'totalDisplayB');

        // Tab switching
        const tabA = document.getElementById('tabA');
        const tabB = document.getElementById('tabB');
        const panelA = document.getElementById('panelA');
        const panelB = document.getElementById('panelB');

        tabA.addEventListener('click', () => {
            tabA.classList.add('active');
            tabB.classList.remove('active');
            panelA.classList.add('active');
            panelB.classList.remove('active');
        });

        tabB.addEventListener('click', () => {
            tabB.classList.add('active');
            tabA.classList.remove('active');
            panelB.classList.add('active');
            panelA.classList.remove('active');
        });

        // Factory to create a grid inside the container with its own total display
        function createGrid(containerId, totalId) {
            const container = document.getElementById(containerId);
            const totalDisplay = document.getElementById(totalId);

            for (let row = 0; row < totalRows; row++) {
                rowValues.forEach(val => {
                    const button = document.createElement('button');
                    button.classList.add('grid-btn');

                    // value as string (keep same display)
                    button.textContent = val;
                    button.dataset.value = val;
                    button.dataset.row = row;

                    // group classes for selected color
                    if (val === 10 || val === 9 || val === 8) {
                        button.classList.add('group-high');
                    } else if (val === 7 || val === 6 || val === 5) {
                        button.classList.add('group-mid');
                    } else {
                        button.classList.add('group-low');
                    }

                    button.addEventListener('click', () => {
                        const rowIndex = button.dataset.row;
                        // find current selected in this row within the same container
                        const selector = `.grid-btn.selected[data-row="${rowIndex}"]`;
                        const currentlySelected = container.querySelector(selector);

                        if (button.classList.contains('selected')) {
                            // clicking the already-selected button deselects it
                            button.classList.remove('selected');
                        } else {
                            // remove selected from other button in same row (if any)
                            if (currentlySelected && currentlySelected !== button) {
                                currentlySelected.classList.remove('selected');
                            }
                            button.classList.add('selected');
                        }

                        updateTotal(container, totalDisplay);
                    });

                    container.appendChild(button);
                });
            }
        }

        // Calculate total for a given container
        function updateTotal(container, totalDisplay) {
            const selectedButtons = container.querySelectorAll('.grid-btn.selected');
            let sum = 0;
            selectedButtons.forEach(btn => {
                sum += parseFloat(btn.dataset.value);
            });

            // Display nicely (avoid trailing .00 if integer)
            const value = Number(sum.toFixed(2));
            totalDisplay.textContent = Number.isInteger(value) ? String(value) : value.toFixed(2);
        }
    </script>

</body>
</html>
