<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">Unjumble - Canción</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --background: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            min-height: 100vh;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 15px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        h1 { font-size: 20px; text-align: center; margin-bottom: 8px; padding-top: 5px; }
        p.subtitle { color: var(--text-light); text-align: center; margin-bottom: 15px; font-size: 13px; }

        #setup-screen, #student-start-screen, #game-screen, #results-screen { display: none; }

        input[type="text"], textarea { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid var(--border); 
            border-radius: 10px; 
            font-size: 15px; 
            margin-bottom: 12px;
        }
        input[type="text"]:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
        }

        .view-section { display: none; }
        .view-section.active { display: flex; flex-direction: column; gap: 15px; }

        /* QR Ajustado para evitar solapamientos en móvil */
        .qr-container {
            position: absolute;
            top: 12px;
            right: 12px;
            cursor: pointer;
            z-index: 50;
            background: white;
            padding: 4px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .qr-container:hover { transform: scale(1.05); }
        .qr-container img { display: block; width: 42px; height: 42px; }

        /* Ajuste específico para el título cuando el QR está presente */
        .has-qr h1 {
            padding-right: 55px;
            text-align: left;
            padding-left: 5px;
        }

        /* Lightbox para expandir el QR */
        .qr-lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .qr-lightbox img {
            width: 260px;
            height: 260px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Estilos del Lienzo Libre (Canvas) - Corregido touch-action */
        .canvas-area {
            width: 100%;
            height: 60vh; 
            background: #fef08a;
            border: 2px dashed #facc15;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            touch-action: none;
        }

        /* Estilos de las fichas - Corregido touch-action */
        .canvas-token {
            position: absolute;
            background: white;
            border: 1px solid #cbd5e1;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: grab;
            user-select: none;
            width: max-content;
            max-width: 90%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.1s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            touch-action: none;
        }
        .canvas-token:active { cursor: grabbing; transform: scale(1.05); z-index: 100; }

        .canvas-token.transmitting { background-color: #eff6ff; border-color: #3b82f6; cursor: pointer; }
        .canvas-token.transmitted-done { background-color: #e2e8f0; border-color: #94a3b8; border-style: dashed; cursor: pointer; }
        .transmit-badge { background: var(--primary); color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }

        /* Pop-up instrucciones */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .popup-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 400px;
            width: 100%;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            font-size: 14px;
            line-height: 1.5;
        }
        .popup-close { position: absolute; top: 8px; right: 12px; background: none; border: none; font-size: 18px; font-weight: bold; color: #94a3b8; cursor: pointer; width: auto; padding: 0; }

        /* Estilos del Tablero Final */
        .word-slots-container { background: #f8fafc; border: 2px solid #cbd5e1; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .slot-wrapper { display: flex; flex-direction: column; width: 100%; position: relative; }
        .slot-underline { width: 100%; height: 2px; background-color: #cbd5e1; margin-top: 4px; }
        .slot-wrapper.has-word .slot-underline { background-color: transparent; }

        /* Fila interactiva global */
        .list-token {
            background: #eff6ff;
            border: 1px solid #3b82f6;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            cursor: pointer;
        }
        
        .list-token.word-correct { background-color: #d1fae5 !important; border-color: #10b981 !important; color: #065f46 !important; cursor: default; }
        .list-token.word-connected { background-color: #e0f2fe !important; border-color: #0284c7 !important; color: #0369a1 !important; }
        .list-token.word-incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .list-token.word-mutated { background-color: #ffffff !important; border-color: #cbd5e1 !important; color: #000000 !important; }

        /* Dropdown invisible pero expandido a toda la celda */
        .token-dropdown { 
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; 
            cursor: pointer; 
            appearance: none;
            -webkit-appearance: none;
        }
        .token-dropdown option { 
            font-size: 14px; 
            color: #000000 !important; 
            text-align: left !important;
            padding: 8px;
        }
        .token-dropdown option:nth-child(even) { background-color: #f1f5f9; }
        .token-dropdown option:nth-child(odd) { background-color: #ffffff; }

        /* Indicador visual de flecha sutil a la derecha */
        .dropdown-indicator {
            font-size: 11px;
            color: inherit;
            opacity: 0.7;
            padding-left: 5px;
            pointer-events: none;
        }

        .btn-container { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-secondary { background-color: #64748b; color: white; }

        /* Estilo Formato Canción de la Pantalla Final Modificado */
        .full-text-result-box {
            padding: 25px 20px;
            border-radius: 12px;
            font-size: 15px; /* Un poco más compacta */
            font-weight: 500;
            line-height: 2;
            white-space: nowrap; /* 🌟 MODIFICADO: Evita el salto de línea automático */
            overflow-x: auto; /* 🌟 MODIFICADO: Agrega scroll horizontal si el verso es largo */
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
        }
        .result-box-success { background-color: #d1fae5; color: #065f46; border: 2px solid #10b981; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.1); }
        .result-box-fail { background-color: #fee2e2; color: #991b1b; border: 2px solid #ef4444; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.1); }

        .victory-trophy { font-size: 54px; text-align: center; margin-bottom: 10px; display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>

    <div class="container" id="main-container">
        
        <div id="qr-widget" class="qr-container" style="display: none;" onclick="openQrLightbox()">
            <canvas id="qr-mini-canvas" style="width: 42px; height: 42px; display: block;"></canvas>
        </div>

        <div id="setup-screen">
            <h1>Unjumble: Canción</h1>
            <p class="subtitle">Configura el título y las estrofas/líneas.</p>
            <input type="text" id="song-title-input" placeholder="Título de la canción (Ej: Imagine)">
            <textarea id="sentences-input" placeholder="Línea 1 del tema&#10;Línea 2 del tema&#10;Línea 3 del tema..."></textarea>
            <div class="btn-container">
                <button class="btn-primary" onclick="launchGame()">Probar Juego</button>
                <button class="btn-secondary" onclick="exportToHTML()">Exportar HTML</button>
            </div>
        </div>

        <div id="student-start-screen" style="text-align:center; padding-top: 25px;">
            <h1 id="student-game-headline" style="font-size: 24px; margin-top: 20px; margin-bottom: 10px;">Unjumble - Canción</h1>
            <button class="btn-success" style="margin: 40px auto; min-width: 140px; font-size: 18px; letter-spacing: 1px; border-radius: 30px;" onclick="startPreloadedGame()">GO</button>
        </div>

        <div id="game-screen">
            <div id="view-workspace" class="view-section active">
                <div id="canvas-container" class="canvas-area"></div>
                <div class="btn-container">
                    <button id="btn-start-transmit" class="btn-primary" onclick="enableTransmitMode()">➡️ CHECK</button>
                </div>
            </div>

            <div id="view-challenge" class="view-section">
                <div id="challenge-slots" class="word-slots-container"></div>
                <div class="btn-container">
                    <button class="btn-success" style="width: 100%;" onclick="checkCurrentAnswer()">CHECK</button>
                </div>
            </div>

            <div class="btn-container" id="back-button-container" style="border-top: 1px solid var(--border); padding-top: 10px; margin-top: 15px;">
                <button class="btn-secondary" style="width:100%;" onclick="returnToSetup()">&larr; Volver Atrás</button>
            </div>
        </div>

        <div id="results-screen">
            <div id="victory-emoji" class="victory-trophy">🏆</div>
            <div id="results-full-text-box" class="full-text-result-box"></div>
            <div class="btn-container">
                <button class="btn-primary" onclick="restartSameGame()">Reiniciar</button>
                <button class="btn-secondary" id="creation-reset-btn" onclick="returnToSetup()">Nuevo</button>
            </div>
        </div>

    </div>

    <div id="qr-lightbox-overlay" class="qr-lightbox" onclick="closeQrLightbox()">
        <canvas id="qr-large-canvas"></canvas>
    </div>

    <div id="instruction-popup" class="popup-overlay">
        <div class="popup-content">
            <button class="popup-close" onclick="closePopup()">×</button>
            <p>🎯 Confirma tu respuesta tocando los trocitos en orden del 1º al último (puedes desmarcar pulsando de nuevo).</p>
        </div>
    </div>

    <script>
        const PRELOADED_SENTENCES = [];
        const PRELOADED_TITLE = "";

        let originalCleanLines = []; 
        let currentSongTitle = "Canción";
        let currentTab = 'workspace';
        
        let tokensData = []; 
        let slotContents = [];    
        let checkedSlotsStatus = []; 

        let isTransmitMode = false;
        let transmitSequence = []; 

        window.addEventListener('DOMContentLoaded', () => {
            if (Array.isArray(PRELOADED_SENTENCES) && PRELOADED_SENTENCES.length > 0) {
                originalCleanLines = [...PRELOADED_SENTENCES];
                currentSongTitle = PRELOADED_TITLE || "Canción";
                
                document.getElementById('page-title').textContent = "Unjumble - " + currentSongTitle;
                document.getElementById('student-game-headline').textContent = "Unjumble - " + currentSongTitle;

                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('creation-reset-btn').style.display = 'none'; 
                document.getElementById('back-button-container').style.display = 'none';
                document.getElementById('student-start-screen').style.display = 'block';
                
                document.getElementById('main-container').classList.add('has-qr');
                generateQR();
            } else {
                document.getElementById('setup-screen').style.display = 'block';
            }
        });

        function generateQR() {
            const currentUrl = window.location.href;
            document.getElementById('qr-widget').style.display = 'block';
            
            QRCode.toCanvas(document.getElementById('qr-mini-canvas'), currentUrl, { width: 42, margin: 1 }, function (error) {
                if (error) console.error(error);
            });
            QRCode.toCanvas(document.getElementById('qr-large-canvas'), currentUrl, { width: 260, margin: 2 }, function (error) {
                if (error) console.error(error);
            });
        }

        function openQrLightbox() { document.getElementById('qr-lightbox-overlay').style.display = 'flex'; }
        function closeQrLightbox() { document.getElementById('qr-lightbox-overlay').style.display = 'none'; }

        function startPreloadedGame() {
            document.getElementById('student-start-screen').style.display = 'none';
            document.getElementById('qr-widget').style.display = 'none'; 
            document.getElementById('main-container').classList.remove('has-qr');
            setupGameSession();
        }

        function launchGame() {
            const inputText = document.getElementById('sentences-input').value.trim();
            const inputTitle = document.getElementById('song-title-input').value.trim();
            if (!inputText) return alert('Texto vacío.');
            
            originalCleanLines = inputText.split('\n').map(s => s.trim()).filter(s => s.length > 0);
            currentSongTitle = inputTitle || "Canción";

            document.getElementById('page-title').textContent = "Unjumble - " + currentSongTitle;
            document.getElementById('student-game-headline').textContent = "Unjumble - " + currentSongTitle;

            document.getElementById('setup-screen').style.display = 'none';
            setupGameSession();
        }

        function setupGameSession() {
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('results-screen').style.display = 'none';
            
            let indicesOrder = originalCleanLines.map((_, i) => i);
            indicesOrder.sort(() => Math.random() - 0.5);

            tokensData = originalCleanLines.map((text, i) => {
                let visualPosition = indicesOrder.indexOf(i);
                return {
                    id: i,
                    text: text,
                    x: 10 + (Math.random() * 40),
                    y: 20 + (visualPosition * 45) 
                };
            });
            
            slotContents = Array(originalCleanLines.length).fill(null);
            checkedSlotsStatus = Array(originalCleanLines.length).fill(null);
            isTransmitMode = false;
            transmitSequence = [];
            document.getElementById('btn-start-transmit').style.display = 'flex';
            switchTab('workspace');
        }

        function switchTab(tabName) {
            currentTab = tabName;
            document.getElementById('view-workspace').classList.toggle('active', tabName === 'workspace');
            document.getElementById('view-challenge').classList.toggle('active', tabName === 'challenge');
            
            if (isTransmitMode && tabName !== 'workspace') { cancelTransmitMode(); }

            if (currentTab === 'workspace') renderCanvas();
            else renderChallengeList();
        }

        function enableTransmitMode() {
            isTransmitMode = true;
            transmitSequence = [];
            document.getElementById('btn-start-transmit').style.display = 'none';
            renderCanvas();
            document.getElementById('instruction-popup').style.display = 'flex'; 
        }

        function closePopup() { document.getElementById('instruction-popup').style.display = 'none'; }

        function cancelTransmitMode() {
            isTransmitMode = false;
            transmitSequence = [];
            document.getElementById('btn-start-transmit').style.display = 'flex';
            closePopup();
        }

        function handleTransmitClick(tokenInfo) {
            const seqIndex = transmitSequence.indexOf(tokenInfo.id);
            if (seqIndex !== -1) {
                transmitSequence.splice(seqIndex, 1);
            } else {
                transmitSequence.push(tokenInfo.id);
            }
            renderCanvas();

            if (transmitSequence.length === originalCleanLines.length) {
                slotContents = transmitSequence.map(id => tokensData.find(t => t.id === id).text);
                checkedSlotsStatus = Array(originalCleanLines.length).fill(null); 
                
                setTimeout(() => {
                    cancelTransmitMode();
                    switchTab('challenge');
                    checkCurrentAnswer(); 
                }, 400);
            }
        }

        function renderCanvas() {
            const canvas = document.getElementById('canvas-container');
            canvas.innerHTML = "";

            tokensData.forEach((tokenInfo) => {
                const token = document.createElement('div');
                token.className = 'canvas-token';
                token.style.left = tokenInfo.x + 'px';
                token.style.top = tokenInfo.y + 'px';

                if (isTransmitMode) {
                    const seqIndex = transmitSequence.indexOf(tokenInfo.id);
                    if (seqIndex !== -1) {
                        token.className += ' transmitted-done';
                        token.innerHTML = `<span>${tokenInfo.text}</span> <span class="transmit-badge">${seqIndex + 1}</span>`;
                    } else {
                        token.className += ' transmitting';
                        token.textContent = tokenInfo.text;
                    }
                    token.onclick = () => handleTransmitClick(tokenInfo);
                } else {
                    token.textContent = tokenInfo.text;

                    let startX, startY, initialLeft, initialTop;
                    let isDragging = false;

                    const dragStart = (clientX, clientY) => {
                        isDragging = true;
                        startX = clientX;
                        startY = clientY;
                        initialLeft = tokenInfo.x;
                        initialTop = tokenInfo.y;
                        token.style.transform = "scale(1.05)";
                    };

                    const dragMove = (clientX, clientY) => {
                        if (!isDragging) return;
                        let deltaX = clientX - startX;
                        let deltaY = clientY - startY;
                        let newLeft = initialLeft + deltaX;
                        let newTop = initialTop + deltaY;

                        if (newLeft < 0) newLeft = 0;
                        if (newTop < 0) newTop = 0;
                        if (newLeft > canvas.clientWidth - token.clientWidth) newLeft = canvas.clientWidth - token.clientWidth;
                        if (newTop > canvas.clientHeight - token.clientHeight) newTop = canvas.clientHeight - token.clientHeight;

                        token.style.left = newLeft + 'px';
                        token.style.top = newTop + 'px';
                        tokenInfo.x = newLeft;
                        tokenInfo.y = newTop;
                    };

                    const dragEnd = () => {
                        if (!isDragging) return;
                        isDragging = false;
                        token.style.transform = "none";
                        resolveCollisions(tokenInfo, token);
                    };

                    token.addEventListener('touchstart', (e) => {
                        if (!isTransmitMode) {
                            e.preventDefault();
                            dragStart(e.touches[0].clientX, e.touches[0].clientY);
                        }
                    }, { passive: false });

                    window.addEventListener('touchmove', (e) => { 
                        if (isDragging) {
                            e.preventDefault();
                            dragMove(e.touches[0].clientX, e.touches[0].clientY); 
                        }
                    }, { passive: false });

                    window.addEventListener('touchend', dragEnd);

                    token.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        dragStart(e.clientX, e.clientY);
                    });
                    window.addEventListener('mousemove', (e) => { if(isDragging) dragMove(e.clientX, e.clientY); });
                    window.addEventListener('mouseup', dragEnd);
                }
                canvas.appendChild(token);
            });
        }

        function resolveCollisions(movedTokenInfo, movedElement) {
            const canvas = document.getElementById('canvas-container');
            let collisionDetected = true;
            let safetyCounter = 0;

            while (collisionDetected && safetyCounter < 15) {
                collisionDetected = false;
                const tokens = canvas.getElementsByClassName('canvas-token');
                const index = tokensData.indexOf(movedTokenInfo);
                const currentRect = movedElement.getBoundingClientRect();

                for (let i = 0; i < tokensData.length; i++) {
                    if (i === index) continue;
                    const otherElement = tokens[i];
                    if (!otherElement) continue;

                    const otherRect = otherElement.getBoundingClientRect();
                    const overlapX = Math.min(currentRect.right, otherRect.right) - Math.max(currentRect.left, otherRect.left);
                    const overlapY = Math.min(currentRect.bottom, otherRect.bottom) - Math.max(currentRect.top, otherRect.top);

                    if (overlapX > 0 && overlapY > 0) {
                        collisionDetected = true;
                        if (overlapX < overlapY) {
                            movedTokenInfo.x += (movedTokenInfo.x > tokensData[i].x) ? overlapX + 4 : -overlapX - 4;
                        } else {
                            movedTokenInfo.y += (movedTokenInfo.y > tokensData[i].y) ? overlapY + 4 : -overlapY - 4;
                        }
                        if (movedTokenInfo.x < 0) movedTokenInfo.x = 0;
                        if (movedTokenInfo.y < 0) movedTokenInfo.y = 0;

                        movedElement.style.left = movedTokenInfo.x + 'px';
                        movedElement.style.top = movedTokenInfo.y + 'px';
                    }
                }
                safetyCounter++;
            }
        }

        function renderChallengeList() {
            const container = document.getElementById('challenge-slots');
            container.innerHTML = "";

            const mutableIndices = [];
            checkedSlotsStatus.forEach((status, idx) => {
                if (status !== 'correct') {
                    mutableIndices.push(idx);
                }
            });

            slotContents.forEach((lineText, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'slot-wrapper';
                if (lineText !== null) wrapper.className += ' has-word';

                const token = document.createElement('div');
                token.className = 'list-token';
                
                const currentStatus = checkedSlotsStatus[index];
                if (currentStatus) {
                    token.className += ` word-${currentStatus}`;
                }

                const displayString = lineText ? `${index + 1}. ${lineText}` : `${index + 1}. [Vacío]`;
                const indicatorHtml = (lineText && currentStatus !== 'correct') ? `<span class="dropdown-indicator">▼</span>` : '';
                token.innerHTML = `<span style="flex:1; padding-right:5px; text-align: left;">${displayString}</span> ${indicatorHtml}`;

                if (lineText && currentStatus !== 'correct') {
                    const select = document.createElement('select');
                    select.className = 'token-dropdown';
                    
                    const defaultOpt = document.createElement('option');
                    defaultOpt.textContent = ""; 
                    defaultOpt.disabled = true;
                    defaultOpt.selected = true;
                    select.appendChild(defaultOpt);

                    mutableIndices.forEach((mutIdx) => {
                        if (mutIdx === index) return; 
                        const opt = document.createElement('option');
                        opt.value = mutIdx;
                        opt.textContent = `${slotContents[mutIdx]}`;
                        select.appendChild(opt);
                    });

                    select.onchange = (e) => {
                        const targetIdx = parseInt(e.target.value);
                        clearIncorrectMarkers();

                        const tempLine = slotContents[index];
                        slotContents[index] = slotContents[targetIdx];
                        slotContents[targetIdx] = tempLine;

                        checkedSlotsStatus[index] = 'mutated';
                        checkedSlotsStatus[targetIdx] = 'mutated';

                        renderChallengeList();
                    };
                    token.appendChild(select);
                }

                wrapper.appendChild(token);
                
                const underline = document.createElement('div');
                underline.className = 'slot-underline';
                wrapper.appendChild(underline);
                container.appendChild(wrapper);
            });
        }

        function clearIncorrectMarkers() {
            for (let i = 0; i < checkedSlotsStatus.length; i++) {
                if (checkedSlotsStatus[i] === 'incorrect' || checkedSlotsStatus[i] === 'mutated') checkedSlotsStatus[i] = null;
            }
        }

        function checkCurrentAnswer() {
            let absoluteMatches = 0;
            
            for (let i = 0; i < originalCleanLines.length; i++) {
                const currentLine = slotContents[i];
                if (!currentLine) { checkedSlotsStatus[i] = 'incorrect'; continue; }

                if (currentLine === originalCleanLines[i]) {
                    checkedSlotsStatus[i] = 'correct';
                    absoluteMatches++;
                    continue;
                }

                const originalIndex = originalCleanLines.indexOf(currentLine);
                let isRelativelyCorrect = false;

                if (originalIndex !== -1) {
                    if (i > 0 && slotContents[i - 1] === originalCleanLines[originalIndex - 1]) isRelativelyCorrect = true;
                    if (i < originalCleanLines.length - 1 && slotContents[i + 1] === originalCleanLines[originalIndex + 1]) isRelativelyCorrect = true;
                }
                checkedSlotsStatus[i] = isRelativelyCorrect ? 'connected' : 'incorrect';
            }

            renderChallengeList();

            if (absoluteMatches === originalCleanLines.length) {
                setTimeout(() => { stopAndScore(true); }, 800);
            }
        }

        function stopAndScore(isVictory) {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            
            const fullTextLines = [];
            originalCleanLines.forEach((line, index) => {
                const userLine = slotContents[index];
                fullTextLines.push(userLine || '[Vacío]');
            });

            const resultBox = document.getElementById('results-full-text-box');
            resultBox.innerText = fullTextLines.join('\n');

            const trophy = document.getElementById('victory-emoji');

            if (isVictory) {
                resultBox.className = "full-text-result-box result-box-success";
                trophy.style.display = "block"; 
            } else {
                resultBox.className = "full-text-result-box result-box-fail";
                trophy.style.display = "none";
            }
        }

        function returnToSetup() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'block';
            document.getElementById('qr-widget').style.display = 'none';
            document.getElementById('main-container').classList.remove('has-qr');
            document.getElementById('page-title').textContent = "Unjumble - Canción";
        }

        function restartSameGame() { setupGameSession(); }

        function exportToHTML() {
            const inputText = document.getElementById('sentences-input').value.trim();
            const inputTitle = document.getElementById('song-title-input').value.trim() || "cancion";
            if (!inputText) return alert('Escribe texto primero.');
            
            const linesArray = inputText.split('\n').map(s => s.trim()).filter(s => s.length > 0);
            let currentHTML = document.documentElement.outerHTML;
            
            currentHTML = currentHTML.replace("const PRELOADED_SENTENCES = [];", `const PRELOADED_SENTENCES = ${JSON.stringify(linesArray)};`);
            currentHTML = currentHTML.replace('const PRELOADED_TITLE = "";', `const PRELOADED_TITLE = ${JSON.stringify(inputTitle)};`);
            
            const safeTitle = inputTitle
                .toLowerCase()
                .replace(/\s+/g, '_')
                .replace(/[^a-z0-9_]/g, '');

            const blob = new Blob([currentHTML], { type: 'text/html;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `unjumble-${safeTitle}.html`;
            a.click();
        }
    </script>
</body>
