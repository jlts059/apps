<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vocab Race Master Pro</title>
    <style>
        :root {
            --primary: #3182ce;
            --success: #38a169;
            --danger: #e53e3e;
            --bg: #f0f4f8;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        .header-widgets {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            z-index: 10;
        }

        .watermark {
            font-size: 0.95rem;
            font-weight: 700;
            color: #a0aec0;
            opacity: 0.6;
            user-select: none;
            letter-spacing: 0.5px;
        }

        .qr-code {
            width: 60px;
            height: 60px;
            background: white;
            padding: 4px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .qr-code:hover { transform: scale(1.05); }

        .qr-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .qr-modal {
            background: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }
        .qr-modal img { width: 250px; height: 250px; }
        .qr-close {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 1.5rem; font-weight: bold; color: #666;
            cursor: pointer;
        }

        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%;
            max-width: 600px; 
            text-align: center; 
            margin-bottom: 20px;
            z-index: 1;
        }

        textarea { 
            width: 100%; 
            height: 150px; 
            margin: 15px 0; 
            padding: 12px; 
            border: 2px solid #cbd5e0; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-family: inherit; 
            resize: vertical;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button { 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1rem; 
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        
        .btn-preview { background: var(--primary); }
        .btn-preview:hover { background: #2b6cb0; }
        .btn-download { background: var(--success); }
        .btn-download:hover { background: #2f855a; }
        .btn-go { background: var(--primary); padding: 25px 70px; font-size: 2.2rem; border-radius: 20px; margin: 20px 0; }
        .btn-go:hover { background: #2b6cb0; }
        
        /* Controles de juego en la misma línea */
        .game-actions {
            display: flex;
            gap: 12px;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-next { background: var(--success); flex: 2; padding: 15px; font-size: 1.6rem; }
        .btn-next:hover { background: #2f855a; }
        .btn-finish { background: var(--danger); flex: 1; padding: 15px; font-size: 1.6rem; }
        .btn-finish:hover { background: #c53030; }
        
        /* Botón CHECK estilo plano */
        .btn-list { background: var(--success); font-size: 1.1rem; padding: 12px 35px; letter-spacing: 1px; margin-top: 15px; text-transform: uppercase; }
        .btn-list:hover { background: #2f855a; }

        p { color: #666; font-size: 0.9rem; margin: 5px 0; }

        .box { 
            background: white; 
            padding: 2rem; 
            border-radius: 24px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
            display: none; 
            margin-top: 10px;
            z-index: 1;
        }

        .timer { font-size: 2rem; color: var(--primary); font-weight: bold; margin-bottom: 10px; }
        .big-timer { font-size: 3.5rem; color: var(--primary); font-weight: 900; margin: 20px 0; }
        .progress-text { color: #718096; font-size: 0.95rem; margin-bottom: 15px; }
        
        .game-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin: 25px 0;
            min-height: 100px;
        }

        .huge-number {
            font-size: 4.5rem;
            font-weight: 900;
            color: #e2e8f0;
            line-height: 1;
            user-select: none;
            border-right: 4px solid #edf2f7;
            padding-right: 20px;
        }

        .def { 
            font-size: 1.8rem; 
            font-weight: 600;
            color: #2d3748; 
            text-align: left;
            flex: 1;
            word-break: break-word;
        }

        /* Tabla compacta: Columnas juntas sin anchos forzados al extremo */
        table { margin: 15px auto; border-collapse: collapse; text-align: left; width: auto; }
        td { padding: 12px 18px; border-bottom: 1px solid #edf2f7; font-size: 1.05rem; white-space: nowrap; }
        .td-num { color: #a0aec0; font-weight: bold; width: 30px; padding-x: 5px; }
        .td-def { color: #4a5568; }
        .td-word { color: #2d3748; font-weight: 600; padding-left: 40px; }
        
        .scroll-container {
            max-height: 300px; 
            overflow-y: auto; 
            border: 1px solid #e2e8f0; 
            border-radius: 10px;
            margin-top: 15px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-widgets">
        <div class="watermark">Vocab Race</div>
        <img id="qr-display" class="qr-code hidden" onclick="openQRModal()" alt="QR Link">
    </div>

    <div id="qr-overlay" class="qr-overlay" onclick="closeQRModal()">
        <div class="qr-modal" onclick="event.stopPropagation()">
            <span class="qr-close" onclick="closeQRModal()">&times;</span>
            <img id="qr-large" alt="QR Large">
        </div>
    </div>

    <div class="container" id="creator-panel">
        <h2>Vocab Race Master</h2>
        <p>Paste your data (Definition [TAB] Word) from Excel or text.</p>
        <textarea id="inputData" placeholder="cambiar [TAB] wechseln&#10;auto [TAB] Auto"></textarea>
        <div class="controls">
            <button class="btn-preview" onclick="setupEngine(false)">Generar Vista Previa 🎮</button>
            <button class="btn-download" onclick="setupEngine(true)">Download Student File 💾</button>
        </div>
    </div>

    <div class="box" id="game-box">
        <div id="s1">
            <button class="btn-go" onclick="startRace()">GO!</button>
        </div>

        <div id="s2" style="display:none">
            <div class="timer" id="t">0.0s</div>
            <div class="progress-text" id="p"></div>
            
            <div class="game-layout">
                <div class="huge-number" id="num-display">1</div>
                <div class="def" id="d"></div>
            </div>
            
            <div class="game-actions">
                <button class="btn-next" onclick="nextWord()">➡️</button>
                <button class="btn-finish" onclick="endRace()">🛑</button>
            </div>
        </div>

        <div id="s3" style="display:none">
            <div id="sc" class="big-timer"></div>
            
            <button id="show-list-btn" class="btn-list hidden" onclick="toggleVocabularyList()">Check</button>
            
            <div id="vocab-list-wrapper" class="scroll-container hidden">
                <table>
                    <tbody id="vocab-tb"></tbody>
                </table>
            </div>
            <br><br>
            <button onclick="resetApp()" style="background:#4299e1; padding:10px 20px;">Back to Editor</button>
        </div>
    </div>

    <script>
        let deck = [];
        let idx = 0;
        let timeStart;
        let timerTicker;
        let logs = [];

        function initQRCode() {
            const currentUrl = window.location.href;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(currentUrl)}`;
            const miniQR = document.getElementById('qr-display');
            const largeQR = document.getElementById('qr-large');
            if(miniQR && largeQR) {
                miniQR.src = qrUrl;
                largeQR.src = qrUrl;
                miniQR.classList.remove('hidden');
            }
        }

        function openQRModal() { document.getElementById('qr-overlay').style.display = 'flex'; }
        function closeQRModal() { document.getElementById('qr-overlay').style.display = 'none'; }

        function parseTextData(text) {
            return text.trim().split('\n').map(line => {
                const p = line.split('\t');
                return { d: p[0]?.trim(), w: p[1]?.trim() };
            }).filter(item => item.d && item.w);
        }

        function setupEngine(shouldDownload) {
            const raw = document.getElementById('inputData').value.trim();
            if (!raw) return alert("Please paste your data first!");
            
            const parsedDeck = parseTextData(raw);
            if (parsedDeck.length === 0) {
                return alert("Format error: Ensure there is a TAB between the definition and the word.");
            }

            if (shouldDownload) {
                buildAndDownloadHTML(parsedDeck);
            } else {
                deck = parsedDeck;
                document.getElementById('creator-panel').classList.add('hidden');
                document.getElementById('game-box').style.display = 'block';
                initQRCode();
                resetRaceState();
            }
        }

        function resetRaceState() {
            idx = 0;
            logs = [];
            clearInterval(timerTicker);
            document.getElementById('s1').style.display = 'block';
            document.getElementById('s2').style.display = 'none';
            document.getElementById('s3').style.display = 'none';
            document.getElementById('t').innerText = '0.0s';
            document.getElementById('show-list-btn').classList.add('hidden');
            document.getElementById('vocab-list-wrapper').classList.add('hidden');
        }

        function startRace() {
            document.getElementById('s1').style.display = 'none';
            document.getElementById('s2').style.display = 'block';
            timeStart = Date.now();
            timerTicker = setInterval(() => {
                const elapsed = (Date.now() - timeStart) / 1000;
                document.getElementById('t').innerText = elapsed.toFixed(1) + 's';
            }, 100);
            renderWord();
        }

        function renderWord() {
            if (idx >= deck.length) {
                endRace();
                return;
            }
            document.getElementById('d').innerText = deck[idx].d; 
            document.getElementById('num-display').innerText = (idx + 1);
            document.getElementById('p').innerText = "Item " + (idx + 1) + " of " + deck.length;
        }

        function nextWord() {
            logs.push({ num: idx + 1, d: deck[idx].d, w: deck[idx].w });
            idx++;
            renderWord();
        }

        function endRace() {
            clearInterval(timerTicker);
            document.getElementById('s2').style.display = 'none';
            document.getElementById('s3').style.display = 'block';
            
            document.getElementById('sc').innerText = "⏱️ " + document.getElementById('t').innerText;
            document.getElementById('show-list-btn').classList.remove('hidden');

            let vocabRows = "";
            deck.forEach((item, index) => {
                vocabRows += `<tr>
                    <td class="td-num">${index + 1}</td>
                    <td class="td-def">${item.d}</td>
                    <td class="td-word">${item.w}</td>
                </tr>`;
            });
            document.getElementById('vocab-tb').innerHTML = vocabRows;
        }

        function toggleVocabularyList() {
            const list = document.getElementById('vocab-list-wrapper');
            if(list.classList.contains('hidden')) {
                list.classList.remove('hidden');
            } else {
                list.classList.add('hidden');
            }
        }

        function resetApp() {
            document.getElementById('game-box').style.display = 'none';
            document.getElementById('creator-panel').classList.remove('hidden');
            document.getElementById('qr-display').classList.add('hidden');
        }

        function buildAndDownloadHTML(deckData) {
            const htmlContent = `<!DOCTYPE html>

<body>
    <div class="header-widgets">
        <div class="watermark">Vocab Race</div>
        <img id="qr-display" class="qr-code" onclick="openQRModal()" alt="QR Link">
    </div>

    <div id="qr-overlay" class="qr-overlay" onclick="closeQRModal()">
        <div class="qr-modal" onclick="event.stopPropagation()">
            <span class="qr-close" onclick="closeQRModal()">&times;</span>
            <img id="qr-large" alt="QR Large">
            <p style="margin-top:10px; font-weight:bold; color:#4a5568;">Scan to join race</p>
        </div>
    </div>

    <div class="box">

            <button class="btn-go" onclick="start()">GO!</button>
