<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tile Panel</title>
    <!-- Librería para generar códigos QR de forma local y limpia -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --text-muted: #7f8c8d;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* Configuración del Administrador */
        #admin-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            max-width: 600px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #27ae60;
        }

        #btn-export {
            background-color: #e67e22;
            display: none;
        }

        #btn-export:hover {
            background-color: #d35400;
        }

        /* Contenedor del QR corregido para evitar cualquier deformación */
        #qr-container {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s ease;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #qr-container:hover {
            transform: scale(1.05);
        }

        /* Asegurar proporciones estrictas 1:1 en la imagen renderizada del QR */
        #qrcode img, #qrcode canvas {
            display: block !important;
            width: 80px !important;
            height: 80px !important;
            object-fit: contain;
        }

        /* QR en pantalla completa (Modal) */
        #qr-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #qr-large {
            background: white;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #qr-large img, #qr-large canvas {
            display: block !important;
            width: 260px !important;
            height: 260px !important;
            object-fit: contain;
        }

        /* Grid de Azulejos Autoadaptable */
        #tiles-grid {
            display: grid;
            gap: 20px;
            max-width: 1200px;
            margin: 40px auto;
        }

        @media (orientation: portrait) {
            #tiles-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (orientation: landscape) {
            #tiles-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .tile {
            color: #2c3e50;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.8rem;
            font-weight: bold;
            border-radius: 16px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tile:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.12);
        }

        .empty-tile {
            aspect-ratio: 1 / 1;
        }

        #status-message {
            font-weight: bold;
            color: #c0392b;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- BLOQUE ADMINISTRADOR -->
    <div id="admin-panel">
        <div class="input-group">
            <label for="drive-url">gDrive link</label>
            <input type="text" id="drive-url" placeholder="https://drive.google.com/drive/folders/..." />
        </div>
        <div class="input-group">
            <label for="sequence-type">Tipo de Secuencia</label>
            <select id="sequence-type">
                <option value="numbers">Números (1, 2, 3...)</option>
                <option value="letters">Letras (A, B, C...)</option>
            </select>
        </div>
        <div class="input-group">
            <label for="doc-title">Título del Archivo</label>
            <input type="text" id="doc-title" placeholder="Ejemplo: MenuRestaurante" value="" />
        </div>
        <div class="btn-group">
            <button onclick="procesarCarpeta()">GO</button>
            <button id="btn-export" onclick="exportarHTML()">💾 to HTML</button>
        </div>
        <div id="status-message"></div>
    </div>

    <!-- CÓDIGO QR -->
    <div id="qr-container" onclick="abrirQR()" title="Click para agrandar">
        <div id="qrcode"></div>
    </div>

    <!-- MODAL PARA QR AGRANDADO -->
    <div id="qr-overlay" onclick="cerrarQR()">
        <div id="qr-large"></div>
    </div>

    <!-- CUADRÍCULA DE AZULEJOS -->
    <div id="tiles-grid"></div>

    <script>
        const API_KEY = 'TU_API_KEY_REAL_AQUI'; 

        const urlActual = window.location.href;
        new QRCode(document.getElementById("qrcode"), { text: urlActual, width: 80, height: 80 });
        new QRCode(document.getElementById("qr-large"), { text: urlActual, width: 260, height: 260 });

        function abrirQR() { document.getElementById('qr-overlay').style.display = 'flex'; }
        function cerrarQR() { document.getElementById('qr-overlay').style.display = 'none'; }

        function obtenerFolderId(url) {
            const match = url.match(/folders\/([a-zA-Z0-9-_]+)/);
            if (match) {
                return match[1].split('?')[0];
            }
            return null;
        }

        function generarColorPastel(index, total) {
            const hue = (index * (360 / Math.max(total, 8))) % 360;
            return `hsl(${hue}, 70%, 82%)`;
        }

        async function procesarCarpeta() {
            const urlInput = document.getElementById('drive-url').value;
            const sequenceType = document.getElementById('sequence-type').value;
            const folderId = obtenerFolderId(urlInput);
            const status = document.getElementById('status-message');
            const grid = document.getElementById('tiles-grid');
            
            grid.innerHTML = '';
            status.innerText = '';

            if (!folderId) {
                status.style.color = "#c0392b";
                status.innerText = "Error: El enlace de Google Drive no es válido.";
                return;
            }

            if (API_KEY === 'TU_API_KEY_REAL_AQUI' || API_KEY === '') {
                status.style.color = "#c0392b";
                status.innerText = "Error: Debes reemplazar 'TU_API_KEY_REAL_AQUI' por tu clave.";
                return;
            }

            status.style.color = "#27ae60";
            status.innerText = "Leyendo archivos de Google Drive...";

            const apiUrl = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,webViewLink)&key=${API_KEY}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.error) {
                    status.style.color = "#c0392b";
                    status.innerText = `Error de API: ${data.error.message}.`;
                    return;
                }

                if (!data.files || data.files.length === 0) {
                    status.style.color = "#c0392b";
                    status.innerText = "No se encontraron archivos o la carpeta no es pública.";
                    return;
                }

                let mapeoArchivos = {};
                let maxIndex = 0;

                data.files.forEach(file => {
                    let numero = null;

                    if (sequenceType === 'numbers') {
                        const match = file.name.match(/^0*([1-9][0-9]*)\./);
                        if (match) {
                            numero = parseInt(match[1], 10);
                        }
                    } else if (sequenceType === 'letters') {
                        const match = file.name.match(/^([A-Z])\./i);
                        if (match) {
                            numero = match[1].toUpperCase().charCodeAt(0) - 64;
                        }
                    }

                    if (numero !== null && numero > 0) {
                        if (file.webViewLink) {
                            mapeoArchivos[numero] = file.webViewLink.replace('/view', '/preview');
                        } else {
                            mapeoArchivos[numero] = `https://drive.google.com/file/d/${file.id}/preview`;
                        }
                        if (numero > maxIndex) maxIndex = numero;
                    }
                });

                if (Object.keys(mapeoArchivos).length === 0) {
                    status.style.color = "#e67e22";
                    status.innerText = "No se encontraron archivos con el formato de secuencia seleccionado.";
                    return;
                }

                for (let i = 1; i <= maxIndex; i++) {
                    if (mapeoArchivos[i]) {
                        const a = document.createElement('a');
                        a.className = 'tile';
                        a.href = mapeoArchivos[i];
                        a.target = '_blank';
                        
                        if (sequenceType === 'numbers') {
                            a.innerText = i;
                        } else {
                            a.innerText = String.fromCharCode(i + 64);
                        }
                        
                        a.style.backgroundColor = generarColorPastel(i, maxIndex);
                        grid.appendChild(a);
                    } else {
                        const div = document.createElement('div');
                        div.className = 'empty-tile';
                        grid.appendChild(div);
                    }
                }

                status.style.color = "#27ae60";
                status.innerText = `¡Hecho! Azulejos generados correctamente.`;
                document.getElementById('btn-export').style.display = 'inline-block';

            } catch (error) {
                console.error(error);
                status.style.color = "#c0392b";
                status.innerText = "Error de conexión.";
            }
        }

        function exportarHTML() {
            let clonDoc = document.documentElement.cloneNode(true);
            const titleInput = document.getElementById('doc-title').value.trim() || 'PROYECTO';
            
            const adminPanel = clonDoc.querySelector('#admin-panel');
            if(adminPanel) adminPanel.remove();

            const scriptAdmin = clonDoc.querySelector('script:last-of-type');
            if(scriptAdmin) {
                scriptAdmin.text = `
                    const urlActual = window.location.href;
                    new QRCode(document.getElementById("qrcode"), { text: urlActual, width: 80, height: 80 });
                    new QRCode(document.getElementById("qr-large"), { text: urlActual, width: 260, height: 260 });

                    function abrirQR() { document.getElementById('qr-overlay').style.display = 'flex'; }
                    function cerrarQR() { document.getElementById('qr-overlay').style.display = 'none'; }
                `;
            }

            const contenidoHtml = "<!DOCTYPE html>\n" + clonDoc.outerHTML;
            const blob = new Blob([contenidoHtml], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `tilelinks-${titleInput}.html`;
            link.click();
        }
    </script>
</body>
</html>
